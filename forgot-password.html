<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - BeyondFrame</title>
  <link rel="icon" type="image/svg+xml" href="camera-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page-container">
  <header class="site-header">
    <div class="brand">
      <h1 onclick="window.location.href='index.html'" style="cursor:pointer">
        <img src="camera-logo.svg" alt="Camera" class="header-logo" /> BeyondFrame
      </h1>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-forms">
      <!-- Step 1: Request Code -->
      <section id="request-code-section" class="auth-card">
        <h2>Forgot Password?</h2>
        <p>Enter your email and we'll send you a 6-digit code to reset your password.</p>
        <form onsubmit="handleForgotRequest(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="forgot-email" placeholder="name@example.com" required />
          </div>
          <button type="submit" class="auth-button">Send Reset Code</button>
          <div class="form-footer">
            <a href="auth.html">Back to Login</a>
          </div>
        </form>
      </section>

      <!-- Step 2: Reset Password -->
      <section id="reset-password-section" class="auth-card hidden">
        <h2>Set New Password</h2>
        <p>Enter the code sent to your email and choose a strong new password.</p>
        <form onsubmit="handleForgotReset(event)">
          <div class="form-group">
            <label>Verification Code</label>
            <input type="text" id="forgot-code" placeholder="6-digit code" required maxlength="6" />
          </div>
          <div class="form-group">
            <label>New Password</label>
            <div class="password-wrapper">
              <input type="password" id="forgot-new-password" placeholder="At least 8 characters" required minlength="8" />
              <button type="button" class="password-toggle-btn" id="forgot-pass-toggle" onclick="togglePasswordVisibility('forgot-pass-toggle', 'forgot-new-password')" title="Show Password">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="auth-button">Reset Password</button>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 BeyondFrame. Capture moments, share scenes.</p>
  </footer>

  <script src="js/script.js"></script>
  <script>
    async function handleForgotRequest(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      const success = await window.apiSendResetCode(email);
      if (success) {
        document.getElementById('request-code-section').classList.add('hidden');
        document.getElementById('reset-password-section').classList.remove('hidden');
      }
    }

    async function handleForgotReset(e) {
      await initApp();
      e.preventDefault();
      const email = window.resetEmail || document.getElementById('forgot-email').value;
      const code = document.getElementById('forgot-code').value;
      const newPassword = document.getElementById('forgot-new-password').value;
      const success = await window.apiResetPassword(email, code, newPassword);
      if (success) {
        setTimeout(() => window.location.href = 'auth.html', 2000);
      }
    }
  </script>
</body>
</html>
