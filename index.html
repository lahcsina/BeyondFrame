<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeyondFrame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="camera-logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="json/manifest.json" />
</head>
<body>
  <!-- Startup Animation Overlay -->
  <div id="startup-overlay" class="startup-overlay">
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="shooting-stars"></div>
    <div class="earth-curve"></div>
    <div class="startup-title">BeyondFrame</div>
    <button id="explore-btn" class="button explore-startup-btn">Explore</button>
  </div>

  <div id="home-content-wrapper" class="home-content-wrapper">
    <header class="site-header">
      <div class="brand">
        <h1><img src="camera-logo.svg" alt="Camera" class="header-logo" /> BeyondFrame</h1>
      </div>
      <nav>
        <a href="index.html" class="active">Home</a>
        <a href="Gallery.html">Gallery</a>
        <a href="submit.html">Submit</a>
      </nav>
    </header>

    <section id="home" class="hero">
      <div class="hero-copy">
        <h2 class="hero-main-title">BeyondFrame</h2>
        <p class="hero-tagline"><i>“Frame less. Feel more.”</i></p>
      </div>

      

      <div class="search-row" style="justify-content: center; max-width: 800px; margin: 0 auto 3rem; display: flex; gap: 1rem;">
        <input id="home-search-query" type="search" placeholder="Search authors, titles, or descriptions..." style="flex: 2;" />
        <select id="sort-order" style="flex: 0 0 160px; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 0.8rem; padding: 0 1rem; cursor: pointer; font-family: inherit; font-size: 0.95rem;">
          <option value="newest">Newest</option>
          <option value="most-liked">Most Liked</option>
        </select>
      </div>

      <!-- Uploader Profile Header -->
      <div id="uploader-profile-header" class="about-section hidden" style="margin-bottom: 2rem; text-align: center; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1.5rem; padding: 2rem;">
        <div class="profile-avatar-container" style="margin-bottom: 1rem;">
          <div class="avatar-wrapper" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent-color); overflow: hidden; margin: 0 auto; display: flex; align-items: center; justify-content: center; background: var(--bg-color);">
            <img id="uploader-img" src="" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <div id="uploader-placeholder" style="font-size: 2rem; opacity: 0.3;">👤</div>
          </div>
        </div>
        <h2 id="uploader-name" style="margin-bottom: 0.5rem;"></h2>
        <div id="uploader-gender" style="margin-bottom: 1rem; opacity: 0.8; font-size: 0.9rem; font-weight: 600; color: var(--accent-color);"></div>
        <p id="uploader-bio" style="max-width: 600px; margin: 0 auto; font-style: italic; font-size: 0.95rem; line-height: 1.6;"></p>
      </div>

      <div id="home-grid" class="hero-grid"></div>
      <div id="pagination" class="pagination-controls">
        <button id="prev-btn" class="button pagination-btn">Previous</button>
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <span id="page-info" class="page-info">Page 1</span>
          <div style="display: flex; align-items: center; gap: 0.4rem;">
            <span style="opacity: 0.6; font-size: 0.85rem;">Jump to:</span>
            <input type="number" id="jump-to-page" min="1" value="1" style="width: 60px; padding: 0.4rem; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 0.5rem; text-align: center; font-family: inherit;" />
          </div>
        </div>
        <button id="next-btn" class="button pagination-btn">Next</button>
      </div>
    </section>

    <footer class="site-footer">
      <p>© 2026 BeyondFrame. Capture moments, share scenes.</p>
    </footer>
  </div>

  <button class="floating-feedback-btn" onclick="openFeedbackModal()" title="Feedback & Complaints">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>

  <script src="js/script.js"></script>
  <script>
    const homeGrid = document.getElementById('home-grid');
    const paginationRow = document.getElementById('pagination');
    const pageInfo = document.getElementById('page-info');
    
    let currentPage = 1;
    const itemsPerPage = 50;
    window.cachedPosts = [];
    window.currentAuthorFilter = null;

    async function renderHomePreview(filterAuthor = null) {
      window.currentAuthorFilter = filterAuthor;

      // Clean up previous ObjectURLs
      homeGrid.querySelectorAll('img').forEach(img => {
        if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
      });

      // Show detailed skeletons during fetch
      const skeletonCard = `
        <div class="hero-card" style="border: none;">
          <div class="skeleton" style="height: 10cm; border-radius: 1.25rem 1.25rem 0 0;"></div>
          <div class="photo-details">
            <div class="meta">
              <div class="skeleton" style="height: 1rem; width: 60%; margin-bottom: 1rem; border-radius: 4px;"></div>
              <div class="card-actions">
                <div class="skeleton" style="height: 1.5rem; width: 50px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 1.5rem; width: 50px; border-radius: 4px;"></div>
                <div class="skeleton" style="height: 1.5rem; width: 50px; border-radius: 4px;"></div>
              </div>
            </div>
          </div>
        </div>`;
      homeGrid.innerHTML = Array(5).fill(skeletonCard).join('');

      const posts = await getAllPosts();
      const sortOrder = document.getElementById('sort-order').value;

      let results = posts.slice();
      if (sortOrder === 'newest') {
        results.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      } else if (sortOrder === 'most-liked') {
        results.sort((a, b) => (b.likes || 0) - (a.likes || 0));
      }

      if (window.currentAuthorFilter) {
        results = results.filter(p => p.author === window.currentAuthorFilter);
      }

      const query = document.getElementById('home-search-query').value.toLowerCase();
      if (query) {
        results = results.filter(p => 
          p.title.toLowerCase().includes(query) || 
          p.description.toLowerCase().includes(query) || 
          p.author.toLowerCase().includes(query)
        );
      }
      
      window.cachedPosts = results;
      const collections = await getAllCollections();
      const savedIds = new Set(collections.flatMap(c => c.postIds));
      homeGrid.innerHTML = '';
      
      const totalPages = Math.ceil(window.cachedPosts.length / itemsPerPage);
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const previewPosts = window.cachedPosts.slice(start, end);

      paginationRow.classList.remove('hidden');
      const totalPagesSafe = totalPages || 1;
      pageInfo.textContent = `Page ${currentPage} of ${totalPagesSafe}`;
      const jumpInput = document.getElementById('jump-to-page');
      jumpInput.value = currentPage;
      jumpInput.max = totalPagesSafe;

      if (!previewPosts.length) {
        homeGrid.innerHTML = '<p class="home-preview-empty">No community photos yet. Upload the first scene to share.</p>';
        return;
      }

      previewPosts.forEach((post) => {
        const card = document.createElement('article');
        card.className = 'hero-card';
        const reviews = post.reviews || [];
        const isSaved = savedIds.has(post.id);

        const currentUser = localStorage.getItem('bf_username');
        const isOwner = currentUser === post.author;

        // Ensure images is a real array before rendering UI elements like the counter
        let images = post.imageData;
        if (typeof images === 'string') {
          try {
            const parsed = JSON.parse(images);
            images = Array.isArray(parsed) ? parsed : [parsed];
          } catch(e) {
            images = [images];
          }
        }
        if (!Array.isArray(images)) images = [images];

        let currentImgIndex = 0;

        const getImgUrl = (idx) => {
          const data = Array.isArray(images) ? images[idx] : images;
          return window.resolveImgUrl(data);
        };

        const initialSrc = getImgUrl(0);
        const bookmarkIcon = `
          <svg class="bookmark-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>`;
        const heartIcon = `
          <svg class="heart-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>`;

        card.innerHTML = `
          <div class="card-image-container">
            <div class="options-container">
              <button class="menu-btn">···</button>
              <div class="menu-dropdown">
                <button onclick="editPost('${post.id}')" style="${isOwner ? '' : 'display:none;'}">Edit</button>
                <button onclick="sharePost('${post.id}')">Share</button>
                <button onclick="deletePostUI('${post.id}')" style="color:#ff4d4d; ${isOwner ? '' : 'display:none;'}">Delete</button>
              </div>
            </div>
            ${images.length > 1 ? `
              <button class="slider-nav-btn prev">‹</button>
              <button class="slider-nav-btn next">›</button>
              <div class="image-counter">1 / ${images.length}</div>
            ` : ''}
            <img alt="${post.title}" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjIwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiM0NDQiLz48Y2lyY2xlIGN4PSIxMDAiIGN5PSI3MCIgcj0iMzAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzk5OSIgc3Ryb2tlLXdpZHRoPSI1Ii8+PHBhdGggZD0iTTEwMCAxMDBsMzAgMzAgLTMwIDMwIC0zMCAtMzAgMzAgLTMwWiIgZmlsbD0iIzk5OSIvPjxwYXRoIGQ9Ik01MCAxNTBoMTAwIiBzdHJva2U9IiM5OTkiIHN0cm9rZS13aWR0aD0iNSIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+PC9zdmc+'"/>
          </div>
          <div class="photo-details">
            <div class="meta">
              <span>By <span class="uploader-link" onclick="filterByUploader('${post.author}')">${post.author}</span></span>
              <div class="card-actions">
                <button class="action-btn ${post.userLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">${heartIcon} ${post.likes || 0}</button>
                <button class="action-btn" onclick="openCommentModal('${post.id}')">💬 ${calculateTotalComments(post)}</button>
                <button class="action-btn ${isSaved ? 'saved' : ''}" onclick="openSaveModal('${post.id}')" title="Save to Collection">${bookmarkIcon}</button>
              </div>
            </div>
          </div>
        `;

        const imgEl = card.querySelector('img');
        imgEl.src = initialSrc; // Safe property assignment
        const counterEl = card.querySelector('.image-counter');
        const menuBtn = card.querySelector('.menu-btn');
        const dropdown = card.querySelector('.menu-dropdown');

        // Toggle the options menu
        menuBtn.onclick = (e) => {
          e.stopPropagation();
          dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
        };

        // Album slider logic
        if (images.length > 1) {
          card.querySelector('.next').onclick = (e) => {
            e.stopPropagation();
            currentImgIndex = (currentImgIndex + 1) % images.length;
            imgEl.src = getImgUrl(currentImgIndex);
            counterEl.textContent = `${currentImgIndex + 1} / ${images.length}`;
          };
          card.querySelector('.prev').onclick = (e) => {
            e.stopPropagation();
            currentImgIndex = (currentImgIndex - 1 + images.length) % images.length;
            imgEl.src = getImgUrl(currentImgIndex);
            counterEl.textContent = `${currentImgIndex + 1} / ${images.length}`;
          };
        }

        // Fix for fullscreen modal
        imgEl.onclick = () => {
          openModal(images, currentImgIndex, post.title, post.description, `Posted by ${post.author}`, post.id, post.author);
        };

        homeGrid.appendChild(card);
      });

      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = currentPage === totalPages;

      // Close dropdowns when clicking anywhere else
      window.addEventListener('click', () => {
        document.querySelectorAll('.menu-dropdown').forEach(d => d.style.display = 'none');
      });
    }

    async function filterByUploader(author) {
      currentPage = 1;

      // Fetch uploader info from the new public endpoint
      try {
        const res = await fetch(`${API_URL}/users/${author}`);
        if (res.ok) {
          const userData = await res.json();
          const header = document.getElementById('uploader-profile-header');
          const img = document.getElementById('uploader-img');
          const placeholder = document.getElementById('uploader-placeholder');
          
          document.getElementById('uploader-name').textContent = userData.username;
          document.getElementById('uploader-gender').textContent = userData.gender || 'Not specified';
          document.getElementById('uploader-bio').textContent = userData.bio || '';
          
          if (userData.profile_pic) {
            img.src = window.resolveImgUrl(userData.profile_pic);
            img.style.display = 'block';
            placeholder.style.display = 'none';
          } else {
            img.style.display = 'none';
            placeholder.style.display = 'block';
          }
          header.classList.remove('hidden');
        }
      } catch (err) { console.error("Failed to fetch uploader info", err); }

      renderHomePreview(author);
      if(!document.getElementById('clear-filter')) {
        const btn = document.createElement('button');
        btn.id = 'clear-filter';
        btn.className = 'button';
        btn.style.display = 'block';
        btn.style.margin = '1rem auto';
        btn.textContent = 'Clear Filter';
        btn.onclick = () => { 
          btn.remove(); 
          window.cachedPosts = []; 
          document.getElementById('uploader-profile-header').classList.add('hidden');
          renderHomePreview(); 
        };
        homeGrid.parentNode.insertBefore(btn, homeGrid);
      }
    }

    async function init() {
      // Startup Animation Logic
      const exploreBtn = document.getElementById('explore-btn');
      const overlay = document.getElementById('startup-overlay');
      const content = document.getElementById('home-content-wrapper');

      // If the animation was already shown in this session, hide it immediately
      if (sessionStorage.getItem('startupDone')) {
        overlay.style.display = 'none';
        content.classList.add('no-animation');
      }
      
      // Shooting Star Spawning Logic
      function spawnShootingStars() {
        if (sessionStorage.getItem('startupDone')) return;
        
        const count = Math.floor(Math.random() * 5) + 1; // 1 to 5 stars
        const container = document.querySelector('.shooting-stars');
        
        for (let i = 0; i < count; i++) {
          // Stagger individual stars within the burst
          setTimeout(() => {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = `${Math.random() * 50 - 20}%`; // Random Y origin
            star.style.left = `${Math.random() * 40 + 60}%`; // Random X origin (right side)
            container.appendChild(star);
            star.addEventListener('animationend', () => star.remove());
          }, Math.random() * 1500);
        }
      }

      // Trigger first burst immediately
      spawnShootingStars();
      const starInterval = setInterval(spawnShootingStars, 4000);

      // Attach the explore button listener immediately so it's responsive while data loads
      exploreBtn.addEventListener('click', () => {
        clearInterval(starInterval);
        overlay.classList.add('fade-out');
        
        setTimeout(() => {
          overlay.style.display = 'none';
          content.classList.add('visible');
          sessionStorage.setItem('startupDone', 'true');
        }, 800);
      });

      exploreBtn.classList.add('loading');
      await openDatabase();
      exploreBtn.classList.remove('loading');

      const urlParams = new URLSearchParams(window.location.search);
      const userFilter = urlParams.get('user');
      if (userFilter) {
        filterByUploader(userFilter);
      } else {
        renderHomePreview();
      }

      document.getElementById('home-search-query').addEventListener('input', () => {
        currentPage = 1;
        renderHomePreview(window.currentAuthorFilter);
      });

      document.getElementById('sort-order').addEventListener('change', () => {
        currentPage = 1;
        renderHomePreview(window.currentAuthorFilter);
      });

      document.getElementById('jump-to-page').addEventListener('change', (e) => {
        const val = parseInt(e.target.value, 10);
        const totalPages = Math.ceil(window.cachedPosts.length / itemsPerPage);
        const totalPagesSafe = totalPages || 1;
        if (val >= 1 && val <= totalPagesSafe) {
          currentPage = val;
          renderHomePreview(window.currentAuthorFilter);
          window.scrollTo(0,0);
        } else {
          e.target.value = currentPage;
        }
      });

      document.getElementById('prev-btn').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderHomePreview(window.currentAuthorFilter); window.scrollTo(0,0); }
      });

      document.getElementById('next-btn').addEventListener('click', () => {
        const totalPages = Math.ceil(window.cachedPosts.length / itemsPerPage);
        if (currentPage < totalPages) { currentPage++; renderHomePreview(window.currentAuthorFilter); window.scrollTo(0,0); }
      });
    }

    init();
  </script>
</body>
</html>
